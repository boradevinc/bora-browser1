name: Build DMG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Application
        run: |
          # ÖNEMLİ: Kendi derleme komutunu buraya yazmalısın.
          # Eğer bir komutun yoksa, kodun derlenmiş hali (yani .app klasörü)
          # hangi klasörde oluşuyorsa (örneğin 'dist' veya 'build') onu kullanacağız.
          # Şimdilik örnek olarak 'build' klasörünü hedefliyorum:
          
          # ÖRN: npm install && npm run build
          # mkdir -p build/BoraBrowser.app # Derlenmiş dosyanı buraya taşıman lazım
          
          echo "Derleme komutunu buraya eklemen lazım"

      - name: Create DMG
        run: |
          # Burada 'build' klasörünün içinde 'BoraBrowser.app' olduğunu varsayıyorum.
          # Kendi klasör yapına göre 'build' yazan yeri değiştir.
          hdiutil create -volname "BoraBrowser" -srcfolder build/BoraBrowser.app -ov -format UDZO BoraBrowser.dmg

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: BoraBrowser.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
