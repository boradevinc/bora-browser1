name: Build Bora Browser

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Bora Browser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        run: |
          # Burada gerekli derleyicileri yüklüyoruz (Node.js/Java vb.)
          npm install

      - name: Build Process
        run: |
          echo "Bora Browser: Tum paketler derleniyor..."
          mkdir -p build_output
          
          # DMG, AppImage ve EXE icin build komutu (Electron kullandigini varsayiyorum)
          npm run dist
          
          # Ciktilari build_output klasorune tasi
          cp dist/*.dmg build_output/BoraBrowser_v1.0.dmg
          cp dist/*.AppImage build_output/BoraBrowser_v1.0.AppImage
          cp dist/*.exe build_output/BoraBrowser_v1.0.exe
          
          # APK icin ayri bir build (Android icin)
          # ./gradlew assembleDebug
          # cp app/build/outputs/apk/debug/*.apk build_output/BoraBrowser_v1.0.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build_output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
